name: Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --verbose

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Check formatting
        run: cargo fmt --check

  build:
    needs: test
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: x86_64
          - target: i686-unknown-linux-musl
            arch: i686
          - target: aarch64-unknown-linux-musleabi
            arch: aarch64
          - target: armv7-unknown-linux-musleabihf
            arch: armv7
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add musl targets
        run: |
          rustup target add "${{ matrix.target }}" 2>/dev/null || echo "Target may not be available"

      - name: Build release
        run: |
          TARGET="${{ matrix.target }}"
          if rustc --print target-list | grep -q "^${TARGET}$"; then
            cargo build --release --target "$TARGET"
          else
            echo "Skipping $TARGET - target not available"
            exit 0
          fi

      - name: Install upx
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update && sudo apt-get install -y upx

      - name: Compress binary
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: upx --best target/${{ matrix.target }}/release/styli-rs

      - name: Generate tarball
        run: |
          mkdir dist
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-musl" ]; then
            cp target/${{ matrix.target }}/release/styli-rs dist/styli-rs_x86_64
            tar -czf styli-rs_x86_64.tar.gz -C dist .
          elif [ "${{ matrix.target }}" = "i686-unknown-linux-musl" ]; then
            cp target/${{ matrix.target }}/release/styli-rs dist/styli-rs_i686
            tar -czf styli-rs_i686.tar.gz -C dist .
          elif [ "${{ matrix.target }}" = "aarch64-unknown-linux-musleabi" ]; then
            cp target/${{ matrix.target }}/release/styli-rs dist/styli-rs_aarch64
            tar -czf styli-rs_aarch64.tar.gz -C dist .
          elif [ "${{ matrix.target }}" = "armv7-unknown-linux-musleabihf" ]; then
            cp target/${{ matrix.target }}/release/styli-rs dist/styli-rs_armv7
            tar -czf styli-rs_armv7.tar.gz -C dist .
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: styli-rs_${{ matrix.arch }}
          path: '*.tar.gz'

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts/

      - name: Create checksums
        run: |
          cd artifacts
          for dir in */; do
            cd "$dir"
            for f in *.tar.gz; do
              sha256sum "$f" > "${f}.sha256"
            done
            cd ..
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
